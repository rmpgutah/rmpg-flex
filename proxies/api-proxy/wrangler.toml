# rmpg-api-proxy — edge router for rmpgutah.us/api/*
#
# Dispatches each request to either the legacy worker (rmpg-flex) or the
# rewrite (rmpg-flex-api) per the STUBS + API_ROUTES rule arrays in index.js.
# See README.md. This project did NOT previously exist on disk — it was
# reconstructed verbatim from the live deployed bundle on 2026-05-28
# (extracted from the workers_get_worker_code result, not retyped).
#
# ⚠️ Before `wrangler deploy`, CONFIRM the values below match the CURRENT
# deployment in the Cloudflare dashboard (Workers → rmpg-api-proxy →
# Settings → Bindings + Triggers). Getting a service binding or the route
# wrong breaks ALL production API routing. account_id comes from the
# CLOUDFLARE_ACCOUNT_ID env var (same as the GH Actions deploy).

name = "rmpg-api-proxy"
main = "index.js"
compatibility_date = "2025-05-01"   # confirm against the live worker before deploy

# Zone route — the proxy intercepts every /api/* request to the app domain.
routes = [
  { pattern = "rmpgutah.us/api/*", zone_name = "rmpgutah.us" },
]

# Service bindings — confirmed against the live bundle (env.API.fetch /
# env.LEGACY.fetch). These MUST match the deployed worker exactly.
[[services]]
binding = "API"
service = "rmpg-flex-api"   # the /src/ rewrite (deployed by .github/workflows/deploy.yml)

[[services]]
binding = "LEGACY"
service = "rmpg-flex"       # the legacy-port worker (prod default for unrouted paths)
