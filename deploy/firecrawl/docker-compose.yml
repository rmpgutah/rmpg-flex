version: "3.9"
services:
  firecrawl:
    image: ghcr.io/mendableai/firecrawl:latest
    ports:
      - "127.0.0.1:3002:3002"
    restart: unless-stopped
    environment:
      - PORT=3002
      - NUM_WORKERS_PER_QUEUE=2
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
volumes:
  redis-data:
