# Brotli compression for static assets — installed alongside gzip (nginx
# does Accept-Encoding negotiation; modern browsers pick `br`, older ones
# fall through to `gzip` which `performance.conf` already handles).
#
# Brotli typically beats gzip by ~15-25% on JS/CSS at comparable CPU cost.
# Level 4 is a good production default: roughly gzip level 6 CPU with
# better ratios. Levels 5-6 cost noticeably more CPU for marginal gain.
#
# Like deploy/nginx/mjs-mime.conf, this file is tracked in-repo so a
# fresh VPS bootstrap can drop it into /etc/nginx/conf.d/ deterministically.
# It does NOT auto-deploy. To install:
#   scp deploy/nginx/brotli.conf root@194.113.64.90:/etc/nginx/conf.d/
#   ssh root@194.113.64.90 'nginx -t && systemctl reload nginx'

brotli on;
brotli_comp_level 4;
brotli_min_length 256;
brotli_static on;  # serves pre-compressed .br files if present
brotli_types
    text/plain
    text/css
    text/xml
    text/javascript
    text/yaml
    application/javascript
    application/json
    application/xml
    application/xml+rss
    application/yaml
    application/wasm
    image/svg+xml
    font/woff
    font/woff2;
