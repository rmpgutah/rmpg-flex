# ============================================================
# .mjs MIME mapping — required for PDF.js worker to load
# ============================================================
# Drop this at /etc/nginx/conf.d/mjs-mime.conf on the VPS, then
# `nginx -t && systemctl reload nginx`.
#
# Why:
#   nginx's default mime.types maps .js → application/javascript
#   but lacks an explicit mapping for .mjs (ES module .js). Files
#   without a mapping fall back to application/octet-stream.
#
#   The PDF.js worker chunk is named pdf.worker.min-<hash>.mjs by
#   pdfjs-dist v5+ (forced ES module to use top-level await /
#   import statements at module scope). Browsers refuse to execute
#   octet-stream as a worker script when the response also carries
#   X-Content-Type-Options: nosniff (which our security headers
#   middleware sets globally — and rightly so).
#
#   Symptom without this file: PDF Editor loads, user clicks
#   "Open PDF", error toast "PDF rendering worker failed to load.
#   The engine uses our native renderer first, then Mozilla's
#   PDF.js (open-source, runs locally) as a fallback."
#
# Audit:
#   curl -sI https://rmpgutah.us/assets/pdf.worker.min-XXXX.mjs
#   should show:
#     content-type: application/javascript
#   NOT:
#     content-type: application/octet-stream
#
# History:
#   First applied 2026-05-05 after PDF Editor hard-broke on a
#   server reload. Vite v8 + pdfjs-dist v5 chunked the worker as
#   .mjs, exposing the missing mapping.
#
# This file is tracked in the repo so a fresh VPS bootstrap (or
# someone wiping /etc/nginx/conf.d) restores it deterministically.
# It does NOT auto-deploy — copy manually or wire into setup-vps.sh.

types {
    application/javascript mjs;
}
