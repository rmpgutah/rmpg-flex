# PR auto-labeling rules based on changed file paths
client:
  - changed-files:
      - any-glob-to-any-file: 'client/**'

server:
  - changed-files:
      - any-glob-to-any-file: 'server/**'

desktop:
  - changed-files:
      - any-glob-to-any-file: 'desktop/**'

dispatch:
  - changed-files:
      - any-glob-to-any-file:
          - 'server/src/routes/dispatch/**'
          - 'client/src/pages/dispatch/**'

ci:
  - changed-files:
      - any-glob-to-any-file: '.github/**'

deploy:
  - changed-files:
      - any-glob-to-any-file: 'deploy/**'

database:
  - changed-files:
      - any-glob-to-any-file: 'server/src/models/**'

auth:
  - changed-files:
      - any-glob-to-any-file:
          - 'server/src/middleware/auth*'
          - 'server/src/routes/auth*'
          - 'server/src/utils/totp*'
