# PR auto-labeling rules based on changed file paths.
# Paths reflect the Cloudflare Workers stack (/src/ is the live API).
# /legacy/ is the quarantined VPS-era code — see legacy/README.md.

client:
  - changed-files:
      - any-glob-to-any-file: 'client/**'

worker:
  - changed-files:
      - any-glob-to-any-file: 'src/**'

dispatch:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/routes/dispatch/**'
          - 'client/src/pages/dispatch/**'

auth:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/middleware/auth*'
          - 'src/routes/auth*'

migrations:
  - changed-files:
      - any-glob-to-any-file: 'migrations/**'

durable-objects:
  - changed-files:
      - any-glob-to-any-file: 'src/durable-objects/**'

ci:
  - changed-files:
      - any-glob-to-any-file: '.github/**'

legacy:
  - changed-files:
      - any-glob-to-any-file: 'legacy/**'
