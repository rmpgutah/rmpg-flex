version: 2
updates:
  # Root package.json (dev tooling)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    ignore:
      # multer 3.x — only ignore future major bumps; 2.x is backward-compatible
      - dependency-name: "multer"
        update-types: ["version-update:semver-major"]

  # Client (React + Vite)
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "client"
    groups:
      # react and react-dom MUST stay on the same major — group them
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
    ignore:
      # React 19 is a major migration — needs planned upgrade with all deps in sync
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      # Vite 8+ requires @vitejs/plugin-react 6+ — needs coordinated upgrade
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      # Tailwind 4.x is a full rewrite — requires planned migration
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      # lucide-react 1.x renames/removes icons — needs manual migration
      - dependency-name: "lucide-react"
        update-types: ["version-update:semver-major"]
      # jsdom 29.x — major version, dev dep
      - dependency-name: "jsdom"
        update-types: ["version-update:semver-major"]

  # Server (Express + SQLite)
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "server"
    ignore:
      - dependency-name: "multer"
        update-types: ["version-update:semver-major"]
      # TypeScript 6.x — major version, needs planned migration
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Desktop (Electron)
  - package-ecosystem: "npm"
    directory: "/desktop"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "desktop"
    ignore:
      # Electron major versions need planned migration (API changes)
      - dependency-name: "electron"
        update-types: ["version-update:semver-major"]
      # better-sqlite3 major versions may change native binding API
      - dependency-name: "better-sqlite3"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
