version: 2
updates:
  # Root package.json (dev tooling)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    ignore:
      # multer 2.x has incompatible API — 8 route files use 1.x patterns
      - dependency-name: "multer"
        update-types: ["version-update:semver-major"]

  # Client (React + Vite)
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "client"
    groups:
      # react and react-dom must always be the same major version
      react:
        patterns:
          - "react"
          - "react-dom"
      # @types/react and @types/react-dom must match
      react-types:
        patterns:
          - "@types/react"
          - "@types/react-dom"
      # vite and @vitejs/plugin-react must be compatible versions
      vite:
        patterns:
          - "vite"
          - "@vitejs/plugin-react"
    ignore:
      # Tailwind 4.x is a full rewrite — requires planned migration
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      # lucide-react 1.x renames/removes icons — needs manual migration
      - dependency-name: "lucide-react"
        update-types: ["version-update:semver-major"]
      # jsdom 29.x — major version, dev dep
      - dependency-name: "jsdom"
        update-types: ["version-update:semver-major"]

  # Server (Express + SQLite)
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "server"
    ignore:
      - dependency-name: "multer"
        update-types: ["version-update:semver-major"]
      # TypeScript 6.x — major version, needs planned migration
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Desktop (Electron)
  - package-ecosystem: "npm"
    directory: "/desktop"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "desktop"
    ignore:
      # Electron major versions need planned migration (API changes)
      - dependency-name: "electron"
        update-types: ["version-update:semver-major"]
      # better-sqlite3 major versions may change native binding API
      - dependency-name: "better-sqlite3"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
