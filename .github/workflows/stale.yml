name: "Stale Cleanup"

on:
  schedule:
    # Daily at 6:13am UTC (12:13am Mountain)
    - cron: "13 6 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close stale PRs and issues
    runs-on: self-hosted
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-pr-label: "stale"
          stale-issue-label: "stale"
          stale-pr-message: "This PR has been inactive for 30 days. It will be closed in 7 days unless updated."
          stale-issue-message: "This issue has been inactive for 30 days. It will be closed in 7 days unless updated."
          # Don't mark Dependabot PRs as stale — they get replaced automatically
          exempt-pr-labels: "dependencies"
          exempt-issue-labels: "pinned,security"
