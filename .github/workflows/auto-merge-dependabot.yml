name: "Auto-merge Dependabot"

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge safe Dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        # Pinned to v2 intentionally.
        # v3.0.0 requires Node.js 24 runtime (breaking change), but
        # ubuntu-latest still defaults to Node 20 until GitHub flips the
        # default on 2026-06-02. Bumping to v3 before then produces
        # `startup_failure` on every run and locks the workflow out of
        # merging its own fix PR. Revisit after 2026-06-02.
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Auto-merge patch and minor updates
        if: >-
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: "${{ github.event.pull_request.html_url }}"
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
