name: "Auto-merge Dependabot"

# ─── pull_request_target, NOT pull_request ───────────────────────
# Dependabot-authored PRs run with a downgraded GITHUB_TOKEN (read-only
# for `contents`). A `pull_request` workflow that declares write perms
# is rejected at dispatch time — `startup_failure` with zero jobs.
#
# `pull_request_target` runs in the context of the base branch (main)
# with main's full repository permissions, and loads the workflow file
# from main — not the PR branch. This is GitHub's documented trigger
# for Dependabot auto-merge workflows.
#
# Security: this trigger runs with write access BEFORE review, which is
# dangerous for fork PRs. Safe here because (a) this is a private repo,
# (b) Dependabot PRs are same-repo (never forks), and (c) the
# `if: github.actor == 'dependabot[bot]'` guard blocks all other actors.
# ──────────────────────────────────────────────────────────────────
on:
  pull_request_target:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge safe Dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        # Pinned to v2 intentionally.
        # v3.0.0 requires Node.js 24 runtime (breaking change), but
        # ubuntu-latest still defaults to Node 20 until GitHub flips the
        # default on 2026-06-02. Bumping to v3 before then produces
        # `startup_failure` on every run and locks the workflow out of
        # merging its own fix PR. Revisit after 2026-06-02.
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Auto-merge patch and minor updates
        if: >-
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: "${{ github.event.pull_request.html_url }}"
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
