name: "PR Tests"

# Runs on every pull request and on direct pushes to main.
# Intentionally SSH-free — this is a quality gate, not a deploy.
# Pairs with deploy.yml (manual deploy workflow) and local deploy.sh gate.
# No untrusted inputs (PR titles/bodies/commit messages) are used in run: steps.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pr-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server-tests:
    name: Server typecheck + tests + route guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: server/package-lock.json
      - name: Install server deps
        working-directory: server
        run: npm ci --no-audit --no-fund
      - name: Route collision guard
        working-directory: server
        run: npm run check:routes
      - name: Server TypeScript check
        working-directory: server
        run: npx tsc --noEmit
      - name: Server vitest suite
        working-directory: server
        run: npx vitest run --reporter=default

  client-typecheck:
    name: Client TypeScript check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json
      - name: Install client deps
        working-directory: client
        run: npm ci --no-audit --no-fund
      - name: TypeScript check
        working-directory: client
        run: npx tsc --noEmit

  client-tests:
    name: Client tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json
      - name: Install client deps
        working-directory: client
        run: npm ci --no-audit --no-fund
      - name: Client vitest suite
        working-directory: client
        run: npx vitest run --reporter=default

  client-build:
    name: Client production build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [client-typecheck]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json
      - name: Install client deps
        working-directory: client
        run: npm ci --no-audit --no-fund
      - name: Build
        working-directory: client
        run: npx vite build
