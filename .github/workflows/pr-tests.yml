name: "PR Tests"

# Runs on every pull request and on direct pushes to main.
# Quality gate for the Cloudflare Workers stack (/src/) and client (/client/).
# Pairs with deploy.yml which deploys to Cloudflare on push to main.
# The legacy /server/ tree (now /legacy/server-vps/) is NOT tested here.
# No untrusted inputs (PR titles/bodies/commit messages) are used in run: steps.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pr-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  worker-typecheck:
    name: Worker TypeScript check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck

  client-typecheck:
    name: Client TypeScript check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json
      - name: Install client deps
        working-directory: client
        run: npm ci --no-audit --no-fund
      - name: TypeScript check
        working-directory: client
        run: npx tsc --noEmit

  client-tests:
    name: Client tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json
      - name: Install client deps
        working-directory: client
        run: npm ci --no-audit --no-fund
      - name: Client vitest suite
        working-directory: client
        run: npx vitest run --reporter=default

  client-build:
    name: Client production build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [client-typecheck]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json
      - name: Install client deps
        working-directory: client
        run: npm ci --no-audit --no-fund
      - name: Build
        working-directory: client
        run: npx vite build
