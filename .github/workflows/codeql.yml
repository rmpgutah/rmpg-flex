name: "Security & Quality"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 8 * * 1"  # Weekly Monday 8:17am UTC
  workflow_dispatch:

jobs:
  security-scan:
    name: Security & TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          npm install --ignore-scripts --legacy-peer-deps
          (cd client && npm install --ignore-scripts --legacy-peer-deps)

      - name: Worker TypeScript check
        run: npx tsc --noEmit

      - name: TypeScript check (client)
        working-directory: client
        run: npx tsc --noEmit || true
        # Pre-existing TS errors may exist after merges
        # Vite build below is the actual deploy gate

      - name: Audit dependencies
        run: |
          echo "=== Root (Worker) ===" && npm audit --audit-level=high || true
          echo "=== Client ===" && (cd client && npm audit --audit-level=high) || true

      - name: Build client
        working-directory: client
        run: npx vite build
