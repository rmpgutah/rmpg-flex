name: "Security & Quality"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 8 * * 1"  # Weekly Monday 8:17am UTC
  workflow_dispatch:

jobs:
  security-scan:
    name: Security & TypeScript Check
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          cd client && npm ci --ignore-scripts
          cd ../server && npm ci --ignore-scripts

      - name: TypeScript check (client)
        run: cd client && npx tsc --noEmit

      - name: Audit dependencies
        run: |
          echo "=== Root ===" && npm audit --audit-level=high || true
          echo "=== Server ===" && cd server && npm audit --audit-level=high || true
          echo "=== Client ===" && cd ../client && npm audit --audit-level=high || true

      - name: Build client
        run: cd client && npx vite build
