name: "Security & Quality"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 8 * * 1"  # Weekly Monday 8:17am UTC
  workflow_dispatch:

jobs:
  security-scan:
    name: Security & TypeScript Check
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          npm install --ignore-scripts --legacy-peer-deps
          (cd client && npm install --ignore-scripts --legacy-peer-deps)
          (cd server && npm install --ignore-scripts --legacy-peer-deps)

      - name: Check for duplicate route handlers (hard block)
        working-directory: server
        run: node scripts/check-duplicate-routes.mjs
        # Zero-dependency detector — no npm install needed.
        # Fails the build if any METHOD+path is registered twice in the same
        # route file. In Express, only the first registration runs; later
        # duplicates are dead code usually reintroduced by stale-branch merges.
        # See server/scripts/check-duplicate-routes.mjs for the full rationale.

      - name: TypeScript check (client)
        working-directory: client
        run: npx tsc --noEmit || true
        # Pre-existing TS errors may exist after merges
        # Vite build below is the actual deploy gate

      - name: Audit dependencies
        run: |
          echo "=== Root ===" && npm audit --audit-level=high || true
          echo "=== Server ===" && (cd server && npm audit --audit-level=high) || true
          echo "=== Client ===" && (cd client && npm audit --audit-level=high) || true

      - name: Build client
        working-directory: client
        run: npx vite build
