name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cf-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Apply D1 migrations (remote)
        continue-on-error: true  # Remote D1 has dirty schema from earlier runs; Worker reconciles at boot.
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply rmpg-flex-db --remote

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Containers rollout is currently SKIPPED — re-enabling it in
          # PR #609 caused wrangler to fail at the registry push with
          # `Unauthorized`. The token rotation that PR #609 referenced
          # either didn't take effect or doesn't include the right
          # scope. Per the original escape-hatch note, we restore the
          # --containers-rollout=none flag so Worker code keeps shipping.
          #
          # Effect: the Container CLASS still bundles into the Worker
          # (getContainer(env.PDF_TOOLS, ...) is callable from code),
          # but the container image stops getting pushed to Cloudflare's
          # registry. /api/pdf-tools/* will return 503 CONTAINER_UNREACHABLE
          # at runtime until the token is fixed and this flag is removed.
          #
          # To re-enable: verify CLOUDFLARE_API_TOKEN has "Containers Write"
          # in CF dashboard → API Tokens, then drop the flag below.
          command: deploy --containers-rollout=none

      # Client SPA build + deploy to Cloudflare Pages.
      # Without these steps the Worker (API) ships but the React app
      # at https://rmpgutah.us stays stuck on whatever bundle was
      # last pushed manually. Incident 2026-05-24: SW v321 lived in
      # prod for weeks while source moved to v563 because deploy.yml
      # only ran the Worker step. All UI fixes silently rotted.
      - name: Install client dependencies
        run: cd client && npm ci

      - name: Build client
        run: cd client && npm run build

      - name: Deploy client to Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy client/dist --project-name=rmpg-flex --branch=main --commit-dirty=true
