name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cf-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Apply D1 migrations to live (`rmpg-flex` DB, 785de7ae-…).
      #
      # Was previously `continue-on-error: true` because the migration
      # tracker on live D1 only had records through 0011, and re-running
      # 0012-0038 from a clean wrangler state would have failed on
      # ALTER conflicts. As of 2026-05-27 those 26 historical migrations
      # are recorded in `d1_migrations` (the changeset for that recording
      # is in this PR's body), so wrangler now skips them. From here on,
      # the migration apply step should ONLY run truly new migrations,
      # which are expected to succeed.
      #
      # A failure here now means the new migration is broken — block the
      # deploy until it's fixed rather than silently shipping the Worker
      # against a stale schema.
      - name: Apply D1 migrations (remote)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply rmpg-flex --remote

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # --containers-rollout=none skips the Cloudflare Containers
          # rollout. Without this, every Worker deploy fails at the
          # container image push step with a bare `Unauthorized` (the
          # image builds fine via Docker on the runner, but the push
          # to Cloudflare's registry is rejected).
          #
          # Probed 2026-05-24 with a freshly issued Account token that
          # included every Workers/D1/KV/R2/Pages scope — still
          # Unauthorized on registry push. The required permission
          # isn't surfaced by name in wrangler's error message and
          # didn't show up under any "Containers" / "Workers" scope
          # in the Cloudflare token UI at the time. Until that's
          # sorted, every route still ships; only the PdfToolsContainer
          # sidecar stays inactive (/api/pdf-tools/* will 500 if called).
          command: deploy --containers-rollout=none

      # Deploy the routing proxy (rmpg-api-proxy) AFTER the API Worker is up.
      # The proxy has service bindings to rmpg-flex-api and rmpg-flex; if we
      # deployed it before rmpg-flex-api here the binding would point at the
      # previous script for the few seconds until rmpg-flex-api finishes its
      # rollout. Sequencing keeps the strangler seam consistent across deploys.
      - name: Deploy proxy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: proxy
          command: deploy

      # Client SPA build + deploy to Cloudflare Pages.
      # Without these steps the Worker (API) ships but the React app
      # at https://rmpgutah.us stays stuck on whatever bundle was
      # last pushed manually. Incident 2026-05-24: SW v321 lived in
      # prod for weeks while source moved to v563 because deploy.yml
      # only ran the Worker step. All UI fixes silently rotted.
      - name: Install client dependencies
        run: cd client && npm ci

      - name: Build client
        run: cd client && npm run build

      - name: Deploy client to Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy client/dist --project-name=rmpg-flex --branch=main --commit-dirty=true
