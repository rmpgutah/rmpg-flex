name: "Deploy to Production"

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      include_installers:
        description: "Include desktop installers (--all flag)"
        required: false
        default: "false"
        type: boolean

jobs:
  deploy:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: TypeScript check
        working-directory: client
        run: npx tsc --noEmit || true

      - name: Run server tests
        working-directory: server
        run: npx vitest run

      - name: Build client
        working-directory: client
        run: npx vite build

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 194.113.64.90 >> ~/.ssh/known_hosts

      - name: Rsync code to Hostinger VPS
        run: |
          rsync -az --delete \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='server/data' \
            --exclude='server/certs' \
            --exclude='server/.env' \
            --exclude='server/uploads' \
            --exclude='client/.env' \
            --exclude='desktop' \
            --exclude='.DS_Store' \
            --exclude='.claude' \
            --exclude='client/android' \
            ./ root@194.113.64.90:/opt/rmpg-flex/

      - name: Deploy on VPS (install deps, restart service)
        run: |
          ssh root@194.113.64.90 bash << 'REMOTEEOF'
            set -e
            APP_DIR="/opt/rmpg-flex"
            cd "$APP_DIR"

            echo ">>> Installing server dependencies..."
            cd server && npm install --production --legacy-peer-deps 2>&1 | tail -5 && cd ..

            echo ">>> Restarting RMPG Flex service..."
            systemctl restart rmpg-flex

            echo ">>> Waiting for service to start..."
            sleep 3

            if systemctl is-active --quiet rmpg-flex; then
              echo "✓ rmpg-flex service is running"
            else
              echo "✗ rmpg-flex service failed to start"
              journalctl -u rmpg-flex --no-pager -n 30
              exit 1
            fi
          REMOTEEOF

      - name: Health check
        run: |
          sleep 5
          curl -sf https://rmpgutah.us/api/health || (echo "Health check failed!" && exit 1)
