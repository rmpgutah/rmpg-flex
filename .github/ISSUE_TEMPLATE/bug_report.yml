name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - Dispatch Console
        - Records (Persons/Vehicles/Properties)
        - Incidents / RMS
        - Citations
        - Warrants
        - Map / GPS
        - CRM / OVERWATCH
        - HR / Personnel
        - Fleet
        - Email
        - Desktop App (Electron)
        - Admin / Settings
        - Authentication / Login
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug — what did you expect vs what actually happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical — system down or data loss
        - High — feature broken, no workaround
        - Medium — feature broken, workaround exists
        - Low — cosmetic or minor
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Web (Chrome)
        - Web (Other browser)
        - Desktop App (macOS)
        - Desktop App (Windows)
        - Mobile (Android)
    validations:
      required: true
