name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - Dispatch Console
        - Records (Persons/Vehicles/Properties)
        - Incidents / RMS
        - Citations
        - Warrants
        - Map / GPS
        - CRM / OVERWATCH
        - HR / Personnel
        - Fleet
        - Email
        - Desktop App (Electron)
        - Admin / Settings
        - New Module
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      placeholder: Describe the feature and what problem it solves.
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Nice to have
        - Important
        - Critical for operations
    validations:
      required: true
