<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/rmpg flex.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RMPG Flex" />
    <meta name="description" content="Rocky Mountain Protective Group — CAD/RMS Dispatch Console" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <script>
      (function () {
        var theme = 'dark';
        try {
          theme = localStorage.getItem('rmpg_theme_preference') === 'light' ? 'light' : 'dark';
        } catch {}

        var chrome = theme === 'light' ? '#f0f2f5' : '#000000';
        var html = document.documentElement;
        html.classList.add('theme-' + theme);
        html.style.colorScheme = theme;
        html.style.backgroundColor = chrome;

        var themeColor = document.querySelector('meta[name="theme-color"]');
        if (themeColor) themeColor.setAttribute('content', chrome);

        var statusBar = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
        if (statusBar) statusBar.setAttribute('content', theme === 'light' ? 'default' : 'black-translucent');
      })();
    </script>
    <!--
      CSP Note: 'unsafe-inline' is required in script-src and style-src for:
      1. Vite dev mode injects inline scripts/styles for HMR
      2. Mapbox GL JS popup InfoWindow inline styles
      TODO (production hardening): Replace 'unsafe-inline' with nonce-based CSP
      by generating a per-request nonce on the server and injecting it into both
      the CSP header and all inline <script>/<style> tags. This requires server-side
      rendering of index.html (not static serving).
    -->
     <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://api.mapbox.com https://js.arcgis.com https://*.arcgis.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://api.mapbox.com https://js.arcgis.com https://*.arcgis.com; img-src 'self' data: blob: https://api.mapbox.com https://tiles.mapbox.com https://*.basemaps.cartocdn.com https://unpkg.com https://*.arcgis.com https://js.arcgis.com; font-src 'self' data: https://*.gstatic.com https://js.arcgis.com https://*.arcgis.com; connect-src 'self' wss: https://api.mapbox.com https://events.mapbox.com https://*.arcgis.com https://js.arcgis.com https://*.arcgisonline.com https://static.cloudflareinsights.com https://rmpgutah.us; frame-src 'self' blob: https://*.arcgis.com; worker-src 'self' blob:; child-src 'self' blob:; manifest-src 'self'" />
    <link rel="manifest" href="/manifest.json" />
    <title>RMPG Flex - Rocky Mountain Protective Group</title>
  </head>
  <body class="bg-[#0a0a0a] text-white">
    <div id="root">
      <!-- Pre-React branded splash — hidden once React hydrates -->
      <div id="pre-splash" style="display:flex;align-items:center;justify-content:center;height:100dvh;height:100vh;background:#0a0a0a">
        <div style="display:flex;flex-direction:column;align-items:center">
          <img src="/rmpg flex.png" alt="RMPG Flex" width="88" height="88"
               style="filter:drop-shadow(0 0 18px rgba(167,177,188,0.22));object-fit:contain" draggable="false" />
          <div style="margin-top:16px;margin-bottom:12px;width:140px;height:2px;background:#1a1a1a;border-radius:1px;overflow:hidden">
            <div style="width:48px;height:100%;background:linear-gradient(90deg,transparent,#a7b1bc,transparent);animation:sl 1.6s ease-in-out infinite"></div>
          </div>
          <p style="font-size:9px;text-transform:uppercase;letter-spacing:0.2em;font-weight:700;color:rgba(160,160,160,0.7);font-family:system-ui,sans-serif;margin:0">
            Initializing
          </p>
        </div>
      </div>
      <style>#pre-splash{transition:opacity .3s}@keyframes sl{0%{transform:translateX(-48px)}100%{transform:translateX(140px)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Service worker registration handled by useServiceWorker hook in React -->
  </body>
</html>
