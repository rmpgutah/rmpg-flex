name = "rmpg-flex-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain. Wrangler provisions the DNS record + zone hostname
# mapping; the zone (rmpgutah.us) must already be on this Cloudflare
# account.
[[routes]]
pattern = "api.rmpgutah.us"
custom_domain = true

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "rmpg-flex-db"
database_id = "8893480a-6dd5-4790-a11f-1fb6fac13f02"

# ─── Durable Objects ─────────────────────────────────────
# WelfareWatchDO — automated officer welfare escalation timer
# (Spillman parity, DI-4 follow-up). One instance per officer
# via env.WELFARE_WATCH.idFromName(`u-${userId}`).
[[durable_objects.bindings]]
name = "WELFARE_WATCH"
class_name = "WelfareWatchDO"

[[migrations]]
tag = "v1"
# new_sqlite_classes (not new_classes) — free-plan compatible.
# SQLite-backed DO storage; same API surface for our use case.
new_sqlite_classes = ["WelfareWatchDO"]

# KV for sessions and caching
[[kv_namespaces]]
binding = "KV"
id = "8e01c392038e4f76838ca9a1130c908e"
preview_id = "8e01c392038e4f76838ca9a1130c908e"

# R2 buckets
[[r2_buckets]]
binding = "MAP_DATA"
bucket_name = "system-essentials"

# Environment variables
[vars]
NODE_ENV = "production"
PRIMARY_DOMAIN = "rmpgutah.us"
CORS_ORIGINS = "https://rmpgutah.us,https://www.rmpgutah.us,http://localhost:5173"
JWT_ACCESS_EXPIRY = "15m"
JWT_REFRESH_EXPIRY = "7d"
SERVER_TIMEZONE = "America/Denver"

# Secrets (set via `npx wrangler secret put`)
# JWT_SECRET (already set)
# GOOGLE_MAPS_API_KEY

# Scheduled cron triggers.
# Utah warrant smoke poll runs every 4h, matching the legacy server's
# scheduleUtahWarrantSync interval. Workers cron uses UTC; "0 */4 * * *"
# means every 4 hours on the hour (00:00, 04:00, 08:00, ... UTC).
[triggers]
crons = ["0 */4 * * *"]

# Durable Object class migrations.
# WelfareWatchDO was deployed at some point from the fix/mount-nibrs-route
# branch (commit f71aae43, never merged to main). Main's src/index.ts has
# never exported the class, so the deployed DO instances are orphaned
# (no live code reads/writes them). Cloudflare blocks subsequent deploys
# from main until we either re-export the class or explicitly authorize
# dropping the orphan instances. Authorizing the drop since the class
# was never live on main.
# Tag must be unique vs any previously-applied migration on this Worker.
# Wrangler skips already-applied tags — a fresh distinctive tag forces
# the deletion through.
[[migrations]]
tag = "drop-welfare-watch-do-2026-05-24"
deleted_classes = ["WelfareWatchDO"]
