name = "rmpg-flex-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain. Wrangler provisions the DNS record + zone hostname
# mapping; the zone (rmpgutah.us) must already be on this Cloudflare
# account.
[[routes]]
pattern = "api.rmpgutah.us"
custom_domain = true

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "rmpg-flex-db"
database_id = "8893480a-6dd5-4790-a11f-1fb6fac13f02"

# ─── Durable Objects ─────────────────────────────────────
# WelfareWatchDO — automated officer welfare escalation timer
# (Spillman parity, DI-4 follow-up). One instance per officer
# via env.WELFARE_WATCH.idFromName(`u-${userId}`).
[[durable_objects.bindings]]
name = "WELFARE_WATCH"
class_name = "WelfareWatchDO"

[[migrations]]
tag = "v1"
# new_sqlite_classes (not new_classes) — free-plan compatible.
# SQLite-backed DO storage; same API surface for our use case.
new_sqlite_classes = ["WelfareWatchDO"]

# KV for sessions and caching
[[kv_namespaces]]
binding = "KV"
id = "8e01c392038e4f76838ca9a1130c908e"
preview_id = "8e01c392038e4f76838ca9a1130c908e"

# R2 buckets
[[r2_buckets]]
binding = "MAP_DATA"
bucket_name = "system-essentials"

# ─── Cloudflare Containers ─────────────────────────────────
# PDF Tools sidecar (qpdf + pdftotext + ocrmypdf). The Worker
# can't shell out to native binaries — this container holds
# them and the Worker proxies via
#   getContainer(env.PDF_TOOLS, "shared").fetch(req)
# See containers/pdf-tools/ for the Dockerfile + FastAPI server.
#
# instance_type = "basic" → 1/4 vCPU, 1 GiB RAM, 4 GB disk.
# "lite" (default, 256 MiB) is too tight for Tesseract on
# multi-page PDFs. Bump to "standard-1" (4 GiB) if OCR
# throughput is a bottleneck.
#
# Docker is required at deploy time — GitHub Actions runners
# have Docker; local dry-runs need Docker Desktop running OR
# pass --containers-rollout=none to skip the container build.
[[containers]]
class_name = "PdfToolsContainer"
image = "./containers/pdf-tools/Dockerfile"
max_instances = 3
instance_type = "basic"

[[durable_objects.bindings]]
name = "PDF_TOOLS"
class_name = "PdfToolsContainer"

# new_sqlite_classes is required for container-enabled DOs
# even though we don't actually use the storage — the Container
# base class extends DurableObject and needs SQLite-backed
# state for lifecycle bookkeeping (sleepAfter timer, etc).
# Tag is namespaced so it doesn't collide with v1 above.
[[migrations]]
tag = "v1-pdftools"
new_sqlite_classes = ["PdfToolsContainer"]

# Environment variables
[vars]
NODE_ENV = "production"
PRIMARY_DOMAIN = "rmpgutah.us"
CORS_ORIGINS = "https://rmpgutah.us,https://www.rmpgutah.us,http://localhost:5173"
JWT_ACCESS_EXPIRY = "15m"
JWT_REFRESH_EXPIRY = "7d"
SERVER_TIMEZONE = "America/Denver"

# Secrets (set via `npx wrangler secret put`)
# JWT_SECRET (already set)
# GOOGLE_MAPS_API_KEY

# Scheduled cron triggers.
# Utah warrant smoke poll runs every 4h, matching the legacy server's
# scheduleUtahWarrantSync interval. Workers cron uses UTC; "0 */4 * * *"
# means every 4 hours on the hour (00:00, 04:00, 08:00, ... UTC).
[triggers]
crons = ["0 */4 * * *"]

# (Removed obsolete deleted_classes migration. The class is now properly
# defined upstream (commit ccb3881b on main added src/durable-objects/
# WelfareWatchDO.ts + the new_sqlite_classes migration above). Deleting
# it after main creates it would defeat the whole point.)
